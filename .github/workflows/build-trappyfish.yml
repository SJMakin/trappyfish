name: Build Trappyfish WASM

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "build.js"
      - "package.json"
      - "TRAPPYFISH.md"
      - ".github/workflows/build-trappyfish.yml"

permissions:
  contents: write

jobs:
  build-lite-single:
    name: Build lite single-threaded engine
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JavaScript dependencies
        run: npm install

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 3.1.7
          actions-cache-folder: emsdk-cache

      - name: Verify Emscripten
        run: emcc --version

      - name: Build Stockfish.js lite single-threaded WASM
        run: npm run build-single-lite

      - name: Rename Trappyfish artifacts
        run: |
          ARTIFACT_DIR="${RUNNER_TEMP}/trappyfish-artifacts"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}/stockfish"
          cp bin/stockfish-18-lite-single.js "${ARTIFACT_DIR}/stockfish/trappyfish-lite-single.js"
          cp bin/stockfish-18-lite-single.wasm "${ARTIFACT_DIR}/stockfish/trappyfish-lite-single.wasm"
          cp Copying.txt "${ARTIFACT_DIR}/Copying.txt"
          cat > "${ARTIFACT_DIR}/README.md" <<EOF
          # Trappyfish Build Artifacts

          Built from \`${GITHUB_SHA}\`.

          Browser assets:

          - \`stockfish/trappyfish-lite-single.js\`
          - \`stockfish/trappyfish-lite-single.wasm\`
          EOF

      - name: Upload Trappyfish artifact
        uses: actions/upload-artifact@v4
        with:
          name: trappyfish-lite-single
          path: ${{ runner.temp }}/trappyfish-artifacts/
          if-no-files-found: error

      - name: Publish build-artifacts branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-artifacts
          git rm -rf .
          cp -R "${RUNNER_TEMP}/trappyfish-artifacts/." .
          git add .
          git commit -m "Build Trappyfish ${GITHUB_SHA}"
          git push --force origin build-artifacts
