name: Build Trappyfish WASM

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "build.js"
      - "package.json"
      - "TRAPPYFISH.md"
      - ".github/workflows/build-trappyfish.yml"

permissions:
  contents: write

jobs:
  build-lite-single:
    name: Build lite single-threaded engine
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify JavaScript build dependencies
        run: node -e "require('uglify-js'); console.log('uglify-js available')"

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 3.1.7
          actions-cache-folder: emsdk-cache

      - name: Verify Emscripten
        run: emcc --version

      - name: Build Stockfish.js lite single-threaded WASM
        id: build
        run: |
          set +e
          npm run build-single-lite > "${RUNNER_TEMP}/trappyfish-build.log" 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          cat "${RUNNER_TEMP}/trappyfish-build.log"
          exit 0

      - name: Prepare Trappyfish output
        if: always()
        run: |
          ARTIFACT_DIR="${RUNNER_TEMP}/trappyfish-artifacts"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}/stockfish"
          cp "${RUNNER_TEMP}/trappyfish-build.log" "${ARTIFACT_DIR}/build.log"
          cp Copying.txt "${ARTIFACT_DIR}/Copying.txt"

          if [ "${{ steps.build.outputs.status }}" = "0" ]; then
            js_file="$(find src -maxdepth 1 -type f -name 'stockfish-18-lite-single*.js' | head -n 1)"
            wasm_file="$(find src -maxdepth 1 -type f -name 'stockfish-18-lite-single*.wasm' | head -n 1)"

            if [ -z "${js_file}" ] || [ -z "${wasm_file}" ]; then
              {
                echo ""
                echo "ERROR: could not find lite-single build outputs."
                echo "Candidate files:"
                find src -maxdepth 1 -type f \( -name 'stockfish-*.js' -o -name 'stockfish-*.wasm' \) -print
              } >> "${RUNNER_TEMP}/trappyfish-build.log"
              exit 1
            fi

            cp "${js_file}" "${ARTIFACT_DIR}/stockfish/trappyfish-lite-single.js"
            cp "${wasm_file}" "${ARTIFACT_DIR}/stockfish/trappyfish-lite-single.wasm"
          fi

          cat > "${ARTIFACT_DIR}/README.md" <<EOF
          # Trappyfish Build Artifacts

          Built from \`${GITHUB_SHA}\`.
          Build status: ${{ steps.build.outputs.status }}

          Browser assets:

          - \`stockfish/trappyfish-lite-single.js\`
          - \`stockfish/trappyfish-lite-single.wasm\`
          EOF

      - name: Upload Trappyfish artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trappyfish-lite-single
          path: ${{ runner.temp }}/trappyfish-artifacts/
          if-no-files-found: error

      - name: Publish build-artifacts branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-artifacts
          git rm -rf .
          cp -R "${RUNNER_TEMP}/trappyfish-artifacts/." .
          git add .
          git commit -m "Build Trappyfish ${GITHUB_SHA}"
          git push --force origin build-artifacts

      - name: Fail if build failed
        if: steps.build.outputs.status != '0'
        run: exit ${{ steps.build.outputs.status }}
